<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
      <section>
        <img src="images/logo.svg" class="logo" alt="Tesla logo">
      </section>

     
      <section class="menu">
        <a href="" class="menu-item">Vehicles</a>
        <a href=""class="menu-item">Energy</a>
        <a href=""class="menu-item">Charging</a>
        <a href=""class="menu-item">Discover</a>
        <a href=""class="menu-item">Shop</a>
      </section>
    

      <section class="options"> 
       <img src="images/help.svg" class="action-icons" alt="Help">
       <img src="images/lang.svg" class="action-icons" alt="Language">
       <img src="images/profile.svg" class="action-icons" alt="Profile">
      </section>
    </header>

    <main>
        <section class="hero-banner">
            <h1 class="main-heading">Model 3</h1>
            <h4 class="sub-headings">One Year of Free Supercharging Ends June 151</h4>
          
         <section class="hero-buttons">
           <button class="primary">Order Now</button>
           <button class="secondary">Learn More</button>
         </section>
        </section>
      
        <section class="cards">
           <h1 class="section-title">Model Section</h1> 
            <div class="flex-container">
             <div class="flex-item1">
                <h2>Model S</h2>
             </div>
             <div class="flex-item2">
                <h2>Model 3</h2>
             </div>
             <div class="flex-item3">
                <h2>Model X</h2>
             </div>
             <div class="flex-item4">
                <h2>Model Y</h2>
             </div>
           </div>

        </section>
        <section class="mini-cards">
          <div class="mini-flex-container">
             <div class="mini-flex-item1">Current Offers</div>
             <div class="mini-flex-item2">Inventory</div>
             
           </div>
        </section>

    </main>

    <footer>
       <ul class="footer-list">
         <li><a href="https://www.tesla.com/about">Tesla 2026</a></li>
         <li><a href="https://www.tesla.com/legal">Privacy & Legal</a></li>
         <li><a href="https://service.tesla.com/en-US/vin-recall-search">Vehicle recalls</a></li>
         <li><a href="https://www.tesla.com/contact">Contact</a></li>
       </ul>
      <div class="footer-buttons">  
       <button class="primary">Ask a question</button>
        <a href="https://www.tesla.com/drive">
          <button class="primary">Schedule a test drive</button>
        </a>
      </div>  
    </footer>
</body>
</html>
